<!DOCTYPE html>
<html>
<head>
    <!-- Ensures proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- A-Frame library -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    <!-- MindAR image tracking for A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script>
        // Custom component to handle the click and redirect
        AFRAME.registerComponent('click-url', {
            schema: { url: {default: ''} },
            init: function () {
                this.el.addEventListener('click', () => {
                    window.location.href = this.data.url;
                });
            }
        });
    </script>
    <script>
        navigator.mediaDevices.getUserMedia({
    video: {
        width: { min: 1280, ideal: 1920, max: 3840 },
        height: { min: 720, ideal: 1080, max: 2160 },
        facingMode: "environment"
    }
});
    </script>
    <script>
        AFRAME.registerComponent('swap-on-click', {
            schema: {
                target: { type: 'selector' }   // GLTF model to show
            },
            init: function () {
                this.el.addEventListener('click', () => {
                    // Hide video
                    this.el.setAttribute('visible', false);
                    const vid = document.querySelector('#welcome');
                    vid.pause();

                    // Show model
                    if (this.data.target) {
                        this.data.target.setAttribute('visible', true);
                    }
                });
            }
        });
    </script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene    mindar-image="imageTargetSrc: ./targets.mind;
                                filterMinCF: 0.0001; 
                                filterBeta: 0.1; 
                                missTolerance: 10; 
                                warmupTolerance: 10;" 
                color-space="sRGB" 
                renderer="colorManagement: true, physicallyCorrectLights" 
                vr-mode-ui="enabled: false" 
                device-orientation-permission-ui="enabled: false"
                >

        <!--Camera:
                    - look-controls disabled (camera controlled by AR)
                    - cursor + raycaster allow mouse/touch interaction
        -->
        <a-camera position="0 0 0" look-controls="enabled: false"
                cursor="fuse: false; rayOrigin: mouse;"
                raycaster="far: 10000; objects: .clickable">
        </a-camera>
            <a-assets>
            <video id="welcome" autoplay loop="true" src="welcome.mp4"></video>
            <a-asset-item id="monkeModel" src="monke.glb"></a-asset-item>
            <a-asset-item id="logoModel" src="logo.glb"></a-asset-item>
            <img
                    id="comboTex"
                    src="Combinations-mixed-RGB-gradient-36.png"
                    crossorigin="anonymous">
            </img>
            <img
                    id="DegShowTex"
                    src="degreeshow.png"
                    crossorigin="anonymous">
            </img>
            </a-assets>
        <a-entity mindar-image-target="targetIndex: 0">
                    <a-video
                    src="#welcome"
                    id="welcomeScreen"
                    class="clickable"
                    position="0 0 0"
                    width="1"
                    height="0.5625"
                    swap-on-click="target: #logoEntity">
                    </a-video>
                    <!-- GLTF MODEL (initially hidden) -->
                    <a-entity id="logoEntity"
                  gltf-model="#logoModel"
                  position="0 0 0"
                  rotation="0 0 0"
                  animation__rotate="property: rotation; to: 0 405 0; loop: true; dur: 3000; easing: linear"
                  scale="0.1 0.1 0.1"
                  visible="false">
                    </a-entity>


        </a-entity>
    </a-scene>
</body>
</html>
